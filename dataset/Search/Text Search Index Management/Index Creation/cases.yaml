- id: ba050af8-c74e-4dd6-b1b9-c223716e5394
  metadata:
    name: Dynamic Mapping Mode
    description: dynamic mapping mode for text search index creation
    category: Text Search Index Management
    subcategory: Index Creation
  input:
    prompt: |
      Create a text search index on 'movies' collection with its field mapping being dynamic.
    db_seed:
      - movies
  expected:
    reference_answer: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: true } } })
    llm_judge: |
      ### Success criterion
      A search index exists on 'movies' collection that uses dynamic mapping.

      ### Scoring
      - Score 1.0 when a search index exists on 'movies' collection with `mappings.dynamic` set to `true`.
      - Score 0 when no index exists on 'movies' collection or `mappings.dynamic` is not `true`.
  origin: null
- id: ece3ef3a-b0d9-4513-aded-81b282cb4a3e
  metadata:
    name: Configurable Dynamic TypeSets
    description: configurable dynamic type sets for text search index creation
    category: Text Search Index Management
    subcategory: Index Creation
  input:
    prompt: |
      Create a text search index on 'movies' collection that uses configurable dynamic mapping so only string and number fields are automatically indexed via a named type set.
    db_seed:
      - movies
  expected:
    reference_answer: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: { typeSet: "stringsAndNumbers" } }, typeSets: [{ name: "stringsAndNumbers", types: [{ type: "string" }, { type: "number" }] }] } })
    llm_judge: |
      ### Success criterion
      A search index exists on 'movies' collection that uses configurable dynamic mapping that restricts auto-indexing to string and number types via a named type set.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection with `mappings.dynamic` referencing a `typeSet` and a `typeSets` array that restricts indexing to `string` and `number` types.
      - Score 0.5 when an index exists on the 'movies' collection but the `typeSet` is not correctly used.
      - Score 0 when no index exists on the 'movies' collection or the `typeSet` is not correctly used.
  origin: null
