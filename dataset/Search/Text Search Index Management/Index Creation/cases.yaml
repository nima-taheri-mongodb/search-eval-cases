    subcategory: Index Creation
  input:
    prompt: |
      Create a text search index on the 'movies' collection that applies MongoDB's built-in Lucene analyzers: index 'title' with 'lucene.keyword' and 'plot' with 'lucene.english'.
    db_seed:
      - movies
  expected:
    reference_answer: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: false, fields: { title: { type: "string", analyzer: "lucene.keyword" }, plot: { type: "string", analyzer: "lucene.english" } } } } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection that uses built-in Lucene analyzers on both `title` and `plot`.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection with `lucene.keyword` on `title` and `lucene.english` on `plot`.
      - Score 0.5 when an index exists on the 'movies' collection but only one of the two analyzer assignments is correct.
      - Score 0 when no search index exists on the 'movies' collection or neither analyzer assignment is correct.
  origin: null
- id: b78d473d-6f5b-4e97-9f51-adecff21a924
  metadata:
    name: Custom Analyzer
    description: custom analyzer for text search index creation
    category: Text Search Index Management
    subcategory: Index Creation
  input:
    prompt: |
      Create a text search index on the 'movies' collection with a custom analyzer that uses the standard tokenizer and lowercases tokens, and apply it to the 'plot' field.
    db_seed:
      - movies
  expected:
    reference_answer: |
      createSearchIndexes({ type: "search", definition: { analyzers: [{ name: "plotCustom", charFilters: [], tokenizer: { type: "standard" }, tokenFilters: [{ type: "lowercase" }] }], mappings: { dynamic: false, fields: { plot: { type: "string", analyzer: "plotCustom" } } } } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection that defines a custom analyzer (standard tokenizer + lowercase filter) and applies it to the `plot` field.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection with an `analyzers` array containing a custom analyzer (standard tokenizer + lowercase token filter) applied to `plot`.
      - Score 0 when no search index exists on the 'movies' collection or the custom analyzer or `plot` field mapping is missing or incorrect.
  origin: null
