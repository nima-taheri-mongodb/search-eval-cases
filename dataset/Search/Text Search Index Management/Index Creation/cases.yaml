    category: Text Search Index Management
    subcategory: Index Creation
  input:
    prompt: |
      Create a text search index on the 'movies' collection for the 'plot' field that indexes with the standard analyzer but applies the 'lucene.english' analyzer at query (search) time.
    db_seed:
      - movies
  expected:
    reference_answer: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: false, fields: { plot: { type: "string", analyzer: "lucene.standard", searchAnalyzer: "lucene.english" } } } } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection that applies `lucene.standard` at index time and `lucene.english` at query time on the `plot` field.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection where the `plot` field defines `searchAnalyzer: "lucene.english"`.
      - Score 0.5 when a search index exists on the 'movies' collection for `plot` but `searchAnalyzer` is missing or not `lucene.english`.
      - Score 0 when no index exists on the 'movies' collection for `plot`.
  origin: null
