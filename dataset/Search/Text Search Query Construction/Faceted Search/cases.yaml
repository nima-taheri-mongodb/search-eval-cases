- id: 3c264f64-dc66-410e-aa7b-4b0722189ff3
  metadata:
    name: Number Facets
    description: number facets for text search query
    category: Text Search Query Construction
    subcategory: Faceted Search
  input:
    prompt: |
      On the 'movies' collection, find movies with 'father daughter family' (use text search) in their plot and bucket them by decade of their 'release_year'.
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: false
                  fields:
                    plot:
                      type: string
                    release_year:
                      type: number
              name: default
              type: search
  expected:
    reference_answer: |
      aggregate([
        {
          $searchMeta: {
            facet: {
              operator: {
                text: {
                  query: "father daughter family",
                  path: "plot"
                }
              },
              facets: {
                decade: {
                  type: "number",
                  path: "release_year",
                  boundaries: [
                    1900, 1910, 1920, 1930, 1940, 1950, 1960, 1970, 1980, 1990,
                    2000, 2010, 2020, 2030
                  ],
                  default: "other"
                }
              }
            },
            index: "default"
          }
        }
      ])
    llm_judge: |
      # Success criterion
      For text search matches in the 'movies' collection, $response reports the same number of movies per decade as the reference facet query $reference_answer.

      # Scoring rubric:
      1. If $response is empty, set score = 0.
      2. If $response reports the same per-decade counts as executing $reference_answer on the 'movies' collection:
         a. If a search index on the 'movies' collection was NOT used in $conversation to fetch the results, set score = 0.2.
         b. Else if facet functionality was NOT used in $conversation to produce per-decade buckets in $response, set score = 0.8.
         c. Else (both search index and facet used), set score = 1.0.
      3. In all other cases, set score = 0.
  origin: null
