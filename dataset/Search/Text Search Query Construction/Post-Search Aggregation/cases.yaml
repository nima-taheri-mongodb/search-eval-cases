- id: 560be07c-ee14-40a8-a0bd-7fdcc277530f
  input:
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
    prompt: |
      On the 'movies' collection, find movies with 'father daughter family' (use text search) in the 'plot' field and bucket them by the 'rating' field into ranges [0, 5), [5, 7), and [7, 10].
  expected:
    llm_judge: |
      ### Success criterion
      For text search matches in the 'movies' collection, $response reports the same per-bucket counts as the reference query.

      ### Reference query
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "father daughter family",
              path: "plot"
            }
          }
        },
        {
          $bucket: {
            groupBy: "$rating",
            boundaries: [0, 5, 7, 10],
            default: "other",
            output: { count: { $sum: 1 } }
          }
        }
      ])

      ### Scoring
      - Score 1.0 when per-bucket counts in $response for matches in the 'movies' collection match the reference query.
      - Reduce the score to 0 if $response is empty.
      - Multiply the score by 0.2x if no search index on the 'movies' collection was used in $conversation to fetch the results.
  metadata:
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
    name: Bucket into Ranges
    description: bucket into ranges for text search query
