      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
    prompt: |
      On the 'movies' collection, find movies with 'terrorists hostage kill navy' (use text search) in their plot and output one document per cast member.
  expected:
    llm_judge: |
      ### Success criterion
      $response yields one row per cast member for each matched movie in the 'movies' collection.

