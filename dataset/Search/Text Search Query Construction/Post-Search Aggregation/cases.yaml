- id: 86fcd90a-5992-4dfd-b1f7-48f0b84988b9
  metadata:
    name: Aggregate Search Results
    description: aggregate search results for text search query
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
  input:
    prompt: |
      On the 'movies' collection, find movies with 'Romance' in their genres and 'marriage wedding sweetheart' (use text search) in their plot.
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
  expected:
    reference_answer: |
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "marriage wedding sweetheart",
              path: "plot"
            }
          }
        },
        {
          $match: {
            genres: "Romance"
          }
        }
      ])
    llm_judge: |
      # Success criterion
      $response lists the same movies from the 'movies' collection as the reference query $reference_answer.

      # Scoring rubric:
      1. If $response is empty, set score = 0.
      2. If $response lists the same movies as executing $reference_answer on the 'movies' collection would yield:
         a. If a search index on the 'movies' collection was NOT used in $conversation, set score = 0.2.
         b. Else, set score = 1.0.
      3. In all other cases, set score = 0.
  origin: null
- id: 40bc4cc4-ded1-4f7f-8964-faf2a52c2056
  metadata:
    name: Parallel Sub-Pipelines
    description: parallel sub-pipelines for text search query
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
  input:
    prompt: |
      On the 'movies' collection, find movies with 'doctor scientist experiment' (use text search) in their plot. In a single aggregation pass, return both the total number of matches and the list of their titles.
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
  expected:
    reference_answer: |
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "doctor scientist experiment",
              path: "plot"
            }
          }
        },
        {
          $facet: {
            count: [{ $count: "total" }],
            titles: [{ $project: { _id: 0, title: 1 } }]
          }
        }
      ])
    llm_judge: |
      # Success criterion
      $response returns both the total match count and the titles from a single aggregation on the 'movies' collection matching the reference query $reference_answer.

      # Scoring rubric:
      1. If $response is empty, set score = 0.
      2. If $response includes both the total match count and the title list that executing $reference_answer on the 'movies' collection would yield:
         a. If a search index on the 'movies' collection was NOT used in $conversation, set score = 0.2.
         b. Else, set score = 1.0.
      3. In all other cases, set score = 0.
  origin: null
- id: 22aca9d4-3217-4733-aeef-6cbf63302037
  metadata:
    name: Flatten Arrays
    description: flatten arrays for text search query
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
  input:
    prompt: |
      On the 'movies' collection, find movies with 'terrorists hostage kill navy' (use text search) in their plot and output one document per cast member.
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
  expected:
    reference_answer: |
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "terrorists hostage kill navy",
              path: "plot"
            }
          }
        },
        {
          $unwind: "$cast"
        }
      ])
    llm_judge: |
      # Success criterion
      $response yields one row per cast member for each movie in the 'movies' collection matched by the reference query $reference_answer.

      # Scoring rubric:
      1. If $response is empty, set score = 0.
      2. If $response yields one document per cast member, matching what executing $reference_answer on the 'movies' collection would yield:
         a. If a search index on the 'movies' collection was NOT used in $conversation, set score = 0.2.
         b. Else, set score = 1.0.
      3. In all other cases, set score = 0.
  origin: null
- id: 560be07c-ee14-40a8-a0bd-7fdcc277530f
  metadata:
    name: Bucket into Ranges
    description: bucket into ranges for text search query
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
  input:
    prompt: |
      On the 'movies' collection, find movies with 'father daughter family' (use text search) in the 'plot' field and bucket them by the 'rating' field into ranges [0, 5), [5, 7), and [7, 10].
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
  expected:
    reference_answer: |
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "father daughter family",
              path: "plot"
            }
          }
        },
        {
          $bucket: {
            groupBy: "$rating",
            boundaries: [0, 5, 7, 10],
            default: "other",
            output: { count: { $sum: 1 } }
          }
        }
      ])
    llm_judge: |
      # Success criterion
      For text search matches in the 'movies' collection, $response reports the same per-bucket counts as the reference query $reference_answer.

      # Scoring rubric:
      1. If $response is empty, set score = 0.
      2. If $response reports the same per-bucket counts as executing $reference_answer on the 'movies' collection:
         a. If a search index on the 'movies' collection was NOT used in $conversation, set score = 0.2.
         b. Else, set score = 1.0.
      3. In all other cases, set score = 0.
  origin: null
