- id: 6e2c1981-cfe4-439d-94ce-e80459149a43
  metadata:
    name: Join with Other Collections
    description: join with other collections for text search query
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
  input:
    prompt: |
      On the 'movies' collection, find movies with 'alien spaceship earth invasion' (use text search) in the 'plot' field. For each match, attach a 'filmography' array of all movies in the 'movies' collection that share the same 'director' field value.
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
  expected:
    reference_answer: |
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "alien spaceship earth invasion",
              path: "plot"
            }
          }
        },
        {
          $lookup: {
            from: "movies",
            localField: "director",
            foreignField: "director",
            as: "filmography"
          }
        }
      ])
    llm_judge: |
      # Success criterion
      Each matched movie from the 'movies' collection in $response includes a 'filmography' array of movies sharing its director, matching the reference query $reference_answer.

      # Scoring rubric:
      1. If $response is empty, set score = 0.
      2. If $response matches what executing $reference_answer on the 'movies' collection would yield (each match has the correct 'filmography' array):
         a. If a search index on the 'movies' collection was NOT used in $conversation, set score = 0.2.
         b. Else, set score = 1.0.
      3. In all other cases, set score = 0.
  origin: null
- id: 2370f91f-528e-4b0d-adf8-80a4057b831f
  metadata:
    name: Promote Embedded Document
    description: promote embedded document for text search query
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
  input:
    prompt: |
      On the 'movies' collection, find movies with 'doctor scientist experiment' (use text search) in their plot. For each, build a sub-document of { title, rating } and promote it to be the top-level document.
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
  expected:
    reference_answer: |
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "doctor scientist experiment",
              path: "plot"
            }
          }
        },
        {
          $replaceWith: { title: "$title", rating: "$rating" }
        }
      ])
    llm_judge: |
      # Success criterion
      $response promotes a '{ title, rating }' sub-document to the root for each movie in the 'movies' collection matched by the reference query $reference_answer.

      # Scoring rubric:
      1. If $response is empty, set score = 0.
      2. If $response matches what executing $reference_answer on the 'movies' collection would yield (root documents contain only 'title' and 'rating'):
         a. If a search index on the 'movies' collection was NOT used in $conversation, set score = 0.2.
         b. Else, set score = 1.0.
      3. In all other cases, set score = 0.
  origin: null
