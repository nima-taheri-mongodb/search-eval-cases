- id: 86fcd90a-5992-4dfd-b1f7-48f0b84988b9
  input:
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
    prompt: |
      On the 'movies' collection, find movies with 'Romance' in their genres and 'marriage wedding sweetheart' (use text search) in their plot.
  expected:
    llm_judge: |
      ### Success criterion
      $response lists the same movies from the 'movies' collection as the reference query.

      ### Reference query
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "marriage wedding sweetheart",
              path: "plot"
            }
          }
        },
        {
          $match: {
            genres: "Romance"
          }
        }
      ])

      ### Scoring
      - Score 1.0 when $response matches the reference query results from the 'movies' collection.
      - Reduce the score to 0 if $response is empty.
      - Multiply the score by 0.2x if no search index on the 'movies' collection was used in $conversation to fetch the results.
  metadata:
    name: Aggregate Search Results
    description: aggregate search results for text search query
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
  origin: null
- id: 40bc4cc4-ded1-4f7f-8964-faf2a52c2056
  input:
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
    prompt: |
      On the 'movies' collection, find movies with 'doctor scientist experiment' (use text search) in their plot. In a single aggregation pass, return both the total number of matches and the list of their titles.
  expected:
    llm_judge: |
      ### Success criterion
      $response returns both the total match count and the titles from a single aggregation on the 'movies' collection matching the reference query.

      ### Reference query
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "doctor scientist experiment",
              path: "plot"
            }
          }
        },
        {
          $facet: {
            count: [{ $count: "total" }],
            titles: [{ $project: { _id: 0, title: 1 } }]
          }
        }
      ])

      ### Scoring
      - Score 1.0 when $response includes both the correct total count and title list from the reference query on the 'movies' collection.
      - Reduce the score to 0 if $response is empty.
      - Multiply the score by 0.2x if no search index on the 'movies' collection was used in $conversation to fetch the results.
  metadata:
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
    name: Parallel Sub-Pipelines
    description: parallel sub-pipelines for text search query
- id: 22aca9d4-3217-4733-aeef-6cbf63302037
  input:
