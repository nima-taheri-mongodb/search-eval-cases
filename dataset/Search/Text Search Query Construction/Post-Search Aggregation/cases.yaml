- id: 6e2c1981-cfe4-439d-94ce-e80459149a43
  input:
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
    prompt: |
      On the 'movies' collection, find movies with 'alien spaceship earth invasion' (use text search) in the 'plot' field. For each match, attach a 'filmography' array of all movies in the 'movies' collection that share the same 'director' field value.
  expected:
    llm_judge: |
      ### Success criterion
      Each matched movie from the 'movies' collection in $response includes a 'filmography' array of movies sharing its director.

      ### Reference query
      aggregate([
        {
          $search: {
            index: "default",
            text: {
              query: "alien spaceship earth invasion",
              path: "plot"
            }
          }
        },
        {
          $lookup: {
            from: "movies",
            localField: "director",
            foreignField: "director",
            as: "filmography"
          }
        }
      ])

      ### Scoring
      - Score 1.0 when $response matches the reference query on the 'movies' collection (each match has the correct 'filmography' array).
      - Reduce the score to 0 if $response is empty.
      - Multiply the score by 0.2x if no search index on the 'movies' collection was used in $conversation to fetch the results.
  metadata:
    category: Text Search Query Construction
    subcategory: Post-Search Aggregation
    name: Join with Other Collections
    description: join with other collections for text search query
