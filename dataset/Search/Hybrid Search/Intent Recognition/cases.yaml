- id: 6cd11d46-3658-4fbb-bf84-2bc3eed2d1ba
  metadata:
    name: Reorder vs Neural Rerank
    description: distinguishing a score reorder from a neural rerank for hybrid search
    category: Hybrid Search
    subcategory: Intent Recognition
  input:
    prompt: |
      On the 'movies' collection, retrieve a broad set of movies semantically similar to 'a deadly virus outbreak or apocalypse' on the 'plot' field, then improve the ordering quality by passing the candidates through a neural reranker. Return the top 8.
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
            - definition:
                fields:
                  - type: autoEmbed
                    path: plot
                    model: voyage-4-lite
                    modality: text
              name: vector_auto_index
              type: vectorSearch
  expected:
    reference_answer: |
      aggregate([
        {
          $vectorSearch: {
            index: "vector_auto_index",
            path: "plot",
            query: { text: "a deadly virus outbreak or apocalypse" },
            numCandidates: 40,
            limit: 20
          }
        },
        {
          $rerank: {
            query: { text: "a deadly virus outbreak or apocalypse" },
            path: "plot",
            numDocsToRerank: 20,
            model: "rerank-2-lite"
          }
        },
        { $limit: 8 },
        { $project: { _id: 0, title: 1, genres: 1, plot: 1 } }
      ])
    llm_judge: |
      # Success criterion
      For the 'movies' collection, $response retrieves a broad candidate set and improves ordering with a neural $rerank stage, not merely a $sort on a score or metadata field, as the reference query $reference_answer. (Note: $rerank requires MongoDB 8.3+ and may be version-gated; judge the constructed pipeline in $conversation rather than execution success.)

      # Scoring rubric:
      1. If $conversation never retrieves candidates for the query, set score = 0.
      2. If $conversation retrieves candidates and then reorders them:
         a. If the reordering is a plain $sort on a score or metadata field (e.g. searchScore, rating) instead of a $rerank stage, set score = 0.5.
         b. Else (a neural $rerank stage with query, path, numDocsToRerank, model), set score = 1.0.
      3. In all other cases, set score = 0.
      4. Efficiency penalty: after determining the score from the rules above, if $conversation shows the assistant issuing more than one aggregate call where an earlier attempt was incorrect — it errored from a malformed pipeline, or was a structurally wrong query the assistant then revised — subtract 0.1 from that score (minimum 0). Do not penalize a single clean attempt, retries caused only by version-gating or transient cluster errors, or the judge's own reference execution of $reference_answer.
