- label: Synonym Source Mappings
  input:
    db_seed:
      - synonyms
      - movies
    prompt: |
      Create a dynamic text search index on the 'movies' collection with a synonyms mapping named 'plotSynonyms' sourced from the 'synonyms' collection, analyzed with lucene.english.
  expected:
    example: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: true }, synonyms: [{ name: "plotSynonyms", source: { collection: "synonyms" }, analyzer: "lucene.english" }] } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection that registers a synonym mapping named `plotSynonyms` sourced from the 'synonyms' collection.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection with `synonyms: [{ name: "plotSynonyms", source: { collection: "synonyms" }, analyzer: "lucene.english" }]`.
      - Score 0 when no search index exists on the 'movies' collection or the synonyms mapping is missing or incorrect.
  metadata:
    summary: synonym source mappings for text search index creation
