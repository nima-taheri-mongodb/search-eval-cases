- id: ba050af8-c74e-4dd6-b1b9-c223716e5394
  label: Dynamic Mapping Mode
  input:
    db_seed:
      - movies
    prompt: |
      Create a text search index on 'movies' collection with its field mapping being dynamic.
  expected:
    example: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: true } } })
    llm_judge: |
      ### Success criterion
      A search index exists on 'movies' collection that uses dynamic mapping.

      ### Scoring
      - Score 1.0 when a search index exists on 'movies' collection with `mappings.dynamic` set to `true`.
      - Score 0 when no index exists on 'movies' collection or `mappings.dynamic` is not `true`.
  metadata:
    summary: dynamic mapping mode for text search index creation
  origin: null
- label: Configurable Dynamic TypeSets
  input:
    db_seed:
      - movies
    prompt: |
      Create a text search index on 'movies' collection that uses configurable dynamic mapping so only string and number fields are automatically indexed via a named type set.
  expected:
    example: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: { typeSet: "stringsAndNumbers" } }, typeSets: [{ name: "stringsAndNumbers", types: [{ type: "string" }, { type: "number" }] }] } })
    llm_judge: |
      ### Success criterion
      A search index exists on 'movies' collection that uses configurable dynamic mapping that restricts auto-indexing to string and number types via a named type set.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection with `mappings.dynamic` referencing a `typeSet` and a `typeSets` array that restricts indexing to `string` and `number` types.
      - Score 0.5 when an index exists on the 'movies' collection but the `typeSet` is not correctly used.
      - Score 0 when no index exists on the 'movies' collection or the `typeSet` is not correctly used.
  metadata:
    summary: configurable dynamic type sets for text search index creation
- label: Field Type Definitions
  input:
    db_seed:
      - movies
    prompt: |
      Create a static text search index on the 'movies' collection that maps 'plot' as a string, 'release_year' as a number, and 'genres' as a string.
  expected:
    example: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: false, fields: { plot: { type: "string" }, release_year: { type: "number" }, genres: { type: "string" } } } } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection that declares explicit per-field types for `plot`, `release_year`, and `genres`.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection mapping `plot` as `string`, `release_year` as `number`, and `genres` as `string`.
      - Score 0 when no index exists on the 'movies' collection or any field type is missing or incorrect.
  metadata:
    summary: field type definitions for text search index creation
- label: Index-Time Analyzer
  input:
    db_seed:
      - movies
    prompt: |
      Create a text search index on the 'movies' collection for the 'plot' field that uses the 'lucene.english' analyzer at index time.
  expected:
    example: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: false, fields: { plot: { type: "string", analyzer: "lucene.english" } } } } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection that applies the `lucene.english` analyzer to the `plot` field at index time.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection where the `plot` field uses analyzer `lucene.english`.
      - Score 0 when no index exists on the 'movies' collection or `plot` does not use `lucene.english` at index time.
  metadata:
    summary: index-time analyzer for text search index creation
- label: Search-Time Analyzer
  input:
    db_seed:
      - movies
    prompt: |
      Create a text search index on the 'movies' collection for the 'plot' field that indexes with the standard analyzer but applies the 'lucene.english' analyzer at query (search) time.
  expected:
    example: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: false, fields: { plot: { type: "string", analyzer: "lucene.standard", searchAnalyzer: "lucene.english" } } } } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection that applies `lucene.standard` at index time and `lucene.english` at query time on the `plot` field.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection where the `plot` field defines `searchAnalyzer: "lucene.english"`.
      - Score 0.5 when a search index exists on the 'movies' collection for `plot` but `searchAnalyzer` is missing or not `lucene.english`.
      - Score 0 when no index exists on the 'movies' collection for `plot`.
  metadata:
    summary: search-time analyzer for text search index creation
- label: Built-in Analyzers
  input:
    db_seed:
      - movies
    prompt: |
      Create a text search index on the 'movies' collection that applies MongoDB's built-in Lucene analyzers: index 'title' with 'lucene.keyword' and 'plot' with 'lucene.english'.
  expected:
    example: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: false, fields: { title: { type: "string", analyzer: "lucene.keyword" }, plot: { type: "string", analyzer: "lucene.english" } } } } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection that uses built-in Lucene analyzers on both `title` and `plot`.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection with `lucene.keyword` on `title` and `lucene.english` on `plot`.
      - Score 0.5 when an index exists on the 'movies' collection but only one of the two analyzer assignments is correct.
      - Score 0 when no search index exists on the 'movies' collection or neither analyzer assignment is correct.
  metadata:
    summary: built-in analyzers for text search index creation
- label: Custom Analyzer
  input:
    db_seed:
      - movies
    prompt: |
      Create a text search index on the 'movies' collection with a custom analyzer that uses the standard tokenizer and lowercases tokens, and apply it to the 'plot' field.
  expected:
    example: |
      createSearchIndexes({ type: "search", definition: { analyzers: [{ name: "plotCustom", charFilters: [], tokenizer: { type: "standard" }, tokenFilters: [{ type: "lowercase" }] }], mappings: { dynamic: false, fields: { plot: { type: "string", analyzer: "plotCustom" } } } } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection that defines a custom analyzer (standard tokenizer + lowercase filter) and applies it to the `plot` field.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection with an `analyzers` array containing a custom analyzer (standard tokenizer + lowercase token filter) applied to `plot`.
      - Score 0 when no search index exists on the 'movies' collection or the custom analyzer or `plot` field mapping is missing or incorrect.
  metadata:
    summary: custom analyzer for text search index creation
- label: Multi Analyzer
  input:
    db_seed:
      - movies
    prompt: |
      Create a text search index on the 'movies' collection for the 'title' field that indexes it with the standard analyzer and additionally provides an alternate ('multi') analysis of the same field using the 'lucene.english' analyzer.
  expected:
    example: |
      createSearchIndexes({ type: "search", definition: { mappings: { dynamic: false, fields: { title: { type: "string", analyzer: "lucene.standard", multi: { english: { type: "string", analyzer: "lucene.english" } } } } } } })
    llm_judge: |
      ### Success criterion
      A search index exists on the 'movies' collection where `title` declares a `multi` analyzer variant alongside its main analyzer.

      ### Scoring
      - Score 1.0 when a search index exists on the 'movies' collection where the `title` field declares a `multi` analyzer (e.g. an `english` variant using `lucene.english`) alongside its main analyzer.
      - Score 0 when no search index exists on the 'movies' collection or the `multi` analyzer is missing on `title`.
  metadata:
    summary: multi analyzer for text search index creation
