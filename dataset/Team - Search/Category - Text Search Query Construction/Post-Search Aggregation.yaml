- id: 86fcd90a-5992-4dfd-b1f7-48f0b84988b9
  label: Aggregate Search Results
  input:
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: true
              name: default
              type: search
    prompt: |
      Find movies with 'Romance' in their genres and 'rich British person India' (use text search) in their plot.
  expected:
    llm_judge: |
      The $response match the same movies as this query yields:
        aggregate([
          {
            $search: {
              index: "default",
              text: {
                query: "rich British person India",
                path: "plot"
              }
            }
          },
          {
            $match: {
              genres: "Romance"
            }
          }
        ])
      * reduce the score to 0 if $response is empty.
      * multiply the score by 0.2x if no search index was used in $conversation to fetch the results.
  metadata:
    summary: aggregate search results for text search query
  origin: null
