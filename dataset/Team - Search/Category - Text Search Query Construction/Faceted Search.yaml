              facets: {
                decade: {
                  type: "date",
                  path: "released",
                  boundaries: [
                    ISODate("1970-01-01"),
                    ISODate("1980-01-01"),
                    ISODate("1990-01-01"),
                    ISODate("2000-01-01"),
                    ISODate("2010-01-01"),
                    ISODate("2020-01-01"),
                    ISODate("2030-01-01")
                  ],
                  default: "other"
                }
              }
            },
            index: "default"
