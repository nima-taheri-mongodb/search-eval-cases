- id: 3c264f64-dc66-410e-aa7b-4b0722189ff3
  label: Number Facets
  input:
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: false
                  fields:
                    plot:
                      type: string
                    release_year:
                      type: number
              name: default
              type: search
    prompt: |
      On the 'movies' collection, find movies with 'father daughter family' (use text search) in their plot and bucket them by decade of their 'release_year'.
  expected:
    llm_judge: |
      ### Success criterion
      For text search matches in the 'movies' collection, $response reports the same number of movies per decade as the reference facet query.

      ### Reference query
      aggregate([
        {
          $searchMeta: {
            facet: {
              operator: {
                text: {
                  query: "father daughter family",
                  path: "plot"
                }
              },
              facets: {
                decade: {
                  type: "number",
                  path: "release_year",
                  boundaries: [
                    1900, 1910, 1920, 1930, 1940, 1950, 1960, 1970, 1980, 1990,
                    2000, 2010, 2020, 2030
                  ],
                  default: "other"
                }
              }
            },
            index: "default"
          }
        }
      ])

      ### Scoring
      - Score 1.0 when per-decade counts in $response for matches in the 'movies' collection match the reference query.
      - Reduce the score to 0 if $response is empty.
      - Multiply the score by 0.2 if no search index on the 'movies' collection was used in $conversation to fetch the results.
  metadata:
    summary: number facets for text search query
  origin: null
