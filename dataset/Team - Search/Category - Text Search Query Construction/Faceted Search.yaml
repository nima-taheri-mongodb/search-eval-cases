- label: Date Facets
  input:
    db_seed:
      - movies:
          indexes:
            - definition:
                mappings:
                  dynamic: false
                  fields:
                    plot:
                      type: string
                    released:
                      type: date
              name: default
              type: search
    prompt: |
      On the 'movies' collection, find movies with 'revolution war world' (use text search) in their plot and bucket them by decade of their 'released' date.
  expected:
    llm_judge: |
      ### Success criterion
